---
# Staging Environment Configuration
environment: staging
gateway:
  url: http://localhost:8188
  username: admin
  password: staging-password
  container_name: ignition-staging
  backup_path: ./backups/staging
database:
  host: localhost
  port: 5432
  name: ignition_staging
  username: ignition
  password: ignition-db-password
projects:
  # List of projects to deploy (will be populated by CI/CD)
  # Format: project-name: path/to/project.zip
deployment:
  auto_backup: true
  backup_retention_days: 30
  require_approval: false
  pre_deploy_scripts:
    - db_migrate
    - smoke_test
  post_deploy_scripts:
    - integration_test
