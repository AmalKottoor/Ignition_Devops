# Azure DevOps Release Promotion Pipeline
# This pipeline promotes a release from staging to production
# Trigger: Manual only (workflow_dispatch equivalent)

trigger: none
pr: none

parameters:
  - name: releaseBranch
    displayName: 'Release Branch'
    type: string
    default: 'release/1.0.0'
  - name: releaseTag
    displayName: 'Release Tag (e.g., v1.0.0)'
    type: string
    default: 'v1.0.0'
  - name: mergeToMain
    displayName: 'Merge to main after successful deployment'
    type: boolean
    default: true

stages:
  - stage: Validate
    displayName: 'Validate Release'
    jobs:
      - job: ValidateJob
        displayName: 'Validate Release Branch'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
            fetchDepth: 0

          - task: Bash@3
            displayName: 'Validate Branch Exists'
            inputs:
              targetType: 'inline'
              script: |
                set -e

                BRANCH="${{ parameters.releaseBranch }}"
                TAG="${{ parameters.releaseTag }}"

                echo "Validating release branch: $BRANCH"

                if ! git rev-parse --verify "origin/$BRANCH" > /dev/null 2>&1; then
                  echo "Error: Branch $BRANCH does not exist"
                  exit 1
                fi

                echo "✓ Branch $BRANCH exists"
                echo "Will create tag: $TAG"

  - stage: CreateTag
    displayName: 'Create Release Tag'
    dependsOn: Validate
    jobs:
      - job: TagJob
        displayName: 'Create and Push Tag'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
            fetchDepth: 0
            persistCredentials: true

          - task: Bash@3
            displayName: 'Create Release Tag'
            inputs:
              targetType: 'inline'
              script: |
                set -e

                BRANCH="${{ parameters.releaseBranch }}"
                TAG="${{ parameters.releaseTag }}"

                git config user.email "azure-pipelines@wilms-ict.com"
                git config user.name "Azure Pipelines"

                echo "Creating tag $TAG on branch $BRANCH"
                git checkout "$BRANCH"
                git tag -a "$TAG" -m "Release $TAG"
                git push origin "$TAG"

                echo "✓ Tag $TAG created and pushed"

  - stage: MergeToMain
    displayName: 'Merge to Main'
    dependsOn: CreateTag
    condition: and(succeeded(), eq('${{ parameters.mergeToMain }}', 'true'))
    jobs:
      - job: MergeJob
        displayName: 'Merge Release to Main'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
            fetchDepth: 0
            persistCredentials: true

          - task: Bash@3
            displayName: 'Merge to Main'
            inputs:
              targetType: 'inline'
              script: |
                set -e

                BRANCH="${{ parameters.releaseBranch }}"

                git config user.email "azure-pipelines@wilms-ict.com"
                git config user.name "Azure Pipelines"

                echo "Merging $BRANCH to main"
                git checkout main
                git merge "$BRANCH" --no-ff -m "Merge $BRANCH into main"
                git push origin main

                echo "✓ Release merged to main"
