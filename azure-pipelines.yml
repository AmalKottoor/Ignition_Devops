# Azure DevOps CI/CD Pipeline for Ignition 8.3
# GitFlow-based deployment strategy
# Repository: git@ssh.dev.azure.com:v3/Wilms-ICT/poc_ignition_8.3/poc_ignition_8.3

trigger:
  branches:
    include:
      - develop
      - release/*
      - main
  tags:
    include:
      - v*

pr:
  branches:
    include:
      - develop
      - release/*
      - main

# Variables for the pipeline
variables:
  buildConfiguration: 'Release'
  dockerComposeFile: 'docker-compose.yml'

stages:
  # Stage 1: Build and Validate
  - stage: Build
    displayName: 'Build and Validate'
    jobs:
      - job: BuildJob
        displayName: 'Build Ignition Projects'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
            fetchDepth: 1

          - task: Bash@3
            displayName: 'Validate Project Names and Structure'
            inputs:
              targetType: 'filePath'
              filePath: './scripts/validate-names.sh'
              arguments: './projects'
            continueOnError: false

          - task: Bash@3
            displayName: 'Package All Projects'
            inputs:
              targetType: 'inline'
              script: |
                set -e
                echo "Packaging all Ignition projects..."

                if [ ! -d "projects" ]; then
                  echo "No projects directory found, creating placeholder..."
                  mkdir -p projects/example-project
                  echo '{"version": "1.0.0", "name": "example-project"}' > projects/example-project/project.json
                fi

                for dir in projects/*/; do
                  if [ -d "$dir" ]; then
                    echo "Packaging $(basename $dir)..."
                    ./scripts/package-project.sh "$dir"
                  fi
                done

                ls -lh build/

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Build Artifacts'
            inputs:
              PathtoPublish: 'build'
              ArtifactName: 'ignition-projects'
              publishLocation: 'Container'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Scripts'
            inputs:
              PathtoPublish: 'scripts'
              ArtifactName: 'scripts'
              publishLocation: 'Container'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Config'
            inputs:
              PathtoPublish: 'config'
              ArtifactName: 'config'
              publishLocation: 'Container'

  # Stage 2: Deploy to Development (from develop branch)
  - stage: DeployDev
    displayName: 'Deploy to Development'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
    jobs:
      - deployment: DeployDevJob
        displayName: 'Deploy to Dev Environment'
        pool:
          name: 'CICD_AZ_INFRA_Agent'
        environment: 'Development'
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: ignition-projects
                - download: current
                  artifact: scripts
                - download: current
                  artifact: config

                - task: Bash@3
                  displayName: 'Deploy to Development Gateway'
                  inputs:
                    targetType: 'inline'
                    script: |
                      set -e

                      # Copy artifacts to working directory
                      cp -r $(Pipeline.Workspace)/ignition-projects ./build
                      cp -r $(Pipeline.Workspace)/scripts ./scripts
                      cp -r $(Pipeline.Workspace)/config ./config

                      chmod +x ./scripts/*.sh

                      # Deploy to dev environment
                      echo "Deploying to Development environment..."
                      ./scripts/deploy.sh dev
                  env:
                    DEV_GATEWAY_URL: $(DEV_GATEWAY_URL)
                    DEV_GATEWAY_USER: $(DEV_GATEWAY_USER)
                    DEV_GATEWAY_PASS: $(DEV_GATEWAY_PASS)

  # Stage 3: Deploy to Staging (from release/* branches)
  - stage: DeployStaging
    displayName: 'Deploy to Staging'
    dependsOn: Build
    condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/heads/release/'))
    jobs:
      - deployment: DeployStagingJob
        displayName: 'Deploy to Staging Environment'
        pool:
          name: 'CICD_AZ_INFRA_Agent'
        environment: 'Staging'
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: ignition-projects
                - download: current
                  artifact: scripts
                - download: current
                  artifact: config

                - task: Bash@3
                  displayName: 'Run Database Migration'
                  inputs:
                    targetType: 'inline'
                    script: |
                      set -e

                      cp -r $(Pipeline.Workspace)/scripts ./scripts
                      cp -r $(Pipeline.Workspace)/config ./config
                      chmod +x ./scripts/*.sh

                      echo "Running database migrations for staging..."
                      ./scripts/db-migrate.sh staging up
                  env:
                    STAGING_DB_URL: $(STAGING_DB_URL)

                - task: Bash@3
                  displayName: 'Deploy to Staging Gateway'
                  inputs:
                    targetType: 'inline'
                    script: |
                      set -e

                      cp -r $(Pipeline.Workspace)/ignition-projects ./build
                      cp -r $(Pipeline.Workspace)/scripts ./scripts
                      cp -r $(Pipeline.Workspace)/config ./config

                      chmod +x ./scripts/*.sh

                      echo "Deploying to Staging environment..."
                      ./scripts/deploy.sh staging
                  env:
                    STAGING_GATEWAY_URL: $(STAGING_GATEWAY_URL)
                    STAGING_GATEWAY_USER: $(STAGING_GATEWAY_USER)
                    STAGING_GATEWAY_PASS: $(STAGING_GATEWAY_PASS)

  # Stage 4: Deploy to Production (from tags on main branch)
  - stage: DeployProd
    displayName: 'Deploy to Production'
    dependsOn: Build
    condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))
    jobs:
      - deployment: DeployProdJob
        displayName: 'Deploy to Production Environment'
        pool:
          name: 'CICD_AZ_INFRA_Agent'
        environment: 'Production'
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: ignition-projects
                - download: current
                  artifact: scripts
                - download: current
                  artifact: config

                - task: Bash@3
                  displayName: 'Backup Production Gateway'
                  inputs:
                    targetType: 'inline'
                    script: |
                      set -e

                      cp -r $(Pipeline.Workspace)/scripts ./scripts
                      cp -r $(Pipeline.Workspace)/config ./config
                      chmod +x ./scripts/*.sh

                      echo "Creating backup of production gateway..."
                      ./scripts/backup-gateway.sh prod
                  env:
                    PROD_GATEWAY_URL: $(PROD_GATEWAY_URL)
                    PROD_GATEWAY_USER: $(PROD_GATEWAY_USER)
                    PROD_GATEWAY_PASS: $(PROD_GATEWAY_PASS)

                - task: Bash@3
                  displayName: 'Run Database Migration'
                  inputs:
                    targetType: 'inline'
                    script: |
                      set -e

                      cp -r $(Pipeline.Workspace)/scripts ./scripts
                      cp -r $(Pipeline.Workspace)/config ./config
                      chmod +x ./scripts/*.sh

                      echo "Running database migrations for production..."
                      ./scripts/db-migrate.sh prod up
                  env:
                    PROD_DB_URL: $(PROD_DB_URL)

                - task: Bash@3
                  displayName: 'Deploy to Production Gateway'
                  inputs:
                    targetType: 'inline'
                    script: |
                      set -e

                      cp -r $(Pipeline.Workspace)/ignition-projects ./build
                      cp -r $(Pipeline.Workspace)/scripts ./scripts
                      cp -r $(Pipeline.Workspace)/config ./config

                      chmod +x ./scripts/*.sh

                      echo "Deploying to Production environment..."
                      ./scripts/deploy.sh prod
                  env:
                    PROD_GATEWAY_URL: $(PROD_GATEWAY_URL)
                    PROD_GATEWAY_USER: $(PROD_GATEWAY_USER)
                    PROD_GATEWAY_PASS: $(PROD_GATEWAY_PASS)

                - task: Bash@3
                  displayName: 'Run Production Smoke Tests'
                  inputs:
                    targetType: 'inline'
                    script: |
                      set -e

                      cp -r $(Pipeline.Workspace)/scripts ./scripts
                      cp -r $(Pipeline.Workspace)/config ./config
                      chmod +x ./scripts/*.sh

                      echo "Running smoke tests on production..."
                      ./scripts/smoke-test.sh prod
                  env:
                    PROD_GATEWAY_URL: $(PROD_GATEWAY_URL)
